version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docuconvert
    ports:
      - "80:80"
      - "443:443"
      - "8000:8000"
    environment:
      - FRONTEND_ORIGINS=*
      - PYTHONUNBUFFERED=1
    volumes:
      - /tmp/uploads:/tmp/uploads
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
